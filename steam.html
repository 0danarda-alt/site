<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STEAM - Level & Games (Full Capture) - Samed</title>
  <style>
    body { background: #0d0d0d; color: #e0e0e0; font-family: Arial; padding: 20px; margin: 0; }
    h1 { color: #00ccff; text-align: center; }
    .container { max-width: 700px; margin: 0 auto; }
    textarea { width: 100%; height: 150px; padding: 12px; background: #1a1a1a; color: white; border: 1px solid #444; border-radius: 6px; font-family: monospace; }
    button { width: 100%; padding: 14px; background: #00ccff; color: black; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin: 10px 0; }
    button:hover { background: #0099cc; }
    #result { margin-top: 20px; padding: 15px; background: #1a1a1a; border-radius: 8px; white-space: pre-wrap; font-family: monospace; line-height: 1.5; }
    .loader { border: 5px solid #333; border-top: 5px solid #00ccff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 30px auto; display: none; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .back { display: block; text-align: center; margin: 20px 0; color: #00ccff; font-size: 1.1rem; }
    .hit { color: #00ff00; font-weight: bold; }
    .fail { color: #ff4444; }
  </style>
</head>
<body>
  <div class="container">
    <h1>STEAM - Level & Games (Full Capture)</h1>
    <p>Combo format: steamid64 veya email:pass (liste olarak gir, her satır bir hesap)</p>

    <textarea id="combo" placeholder="76561197960287930&#10;email1:pass1&#10;email2:pass2&#10;..."></textarea>

    <button id="btnCheck">CHECKLE (Captureli)</button>

    <div class="loader" id="loader"></div>

    <div id="result"></div>

    <a href="index.html" class="back">← Dashboard'a Dön</a>
  </div>

  <script>
    document.getElementById('btnCheck').addEventListener('click', async () => {
      const input = document.getElementById('combo').value.trim();
      const result = document.getElementById('result');
      const loader = document.getElementById('loader');
      const btn = document.getElementById('btnCheck');

      if (!input) {
        result.innerHTML = '<span class="fail">Combo girin!</span>';
        return;
      }

      result.innerHTML = '';
      loader.style.display = 'block';
      btn.disabled = true;

      const lines = input.split('\n').filter(l => l.trim());
      let output = '';

      for (let line of lines) {
        const trimmed = line.trim();
        let identifier = trimmed; // steamid64 veya email:pass

        if (trimmed.includes(':')) {
          const [email, pass] = trimmed.split(':');
          identifier = email; // login dene, ama örnekte steamid kullanacağız
        }

        // Örnek capture: Steam Community profilinden veri çek (gerçekte proxy lazım, CORS için)
        try {
          // Gerçek kullanımda Steam API veya scraping proxy kullan (örnek simülasyon)
          // Gerçek kod: fetch(`https://steamcommunity.com/profiles/${identifier}?xml=1`) gibi
          // Burada simüle edelim (gerçekte çalışması için backend ekle veya proxy)
          const fakeResponse = {
            success: Math.random() > 0.3, // %70 hit simülasyon
            level: Math.floor(Math.random() * 200) + 1,
            games: Math.floor(Math.random() * 500) + 10,
            badges: Math.floor(Math.random() * 100) + 5,
            lastGame: 'Counter-Strike 2',
            profile: `https://steamcommunity.com/id/fakeuser${Math.random().toString(36).slice(2,8)}`
          };

          if (fakeResponse.success) {
            output += `<span class="hit">[HIT] ${trimmed}</span>\n`;
            output += `  Level: ${fakeResponse.level}\n`;
            output += `  Oyun Sayısı: ${fakeResponse.games}\n`;
            output += `  Badge Sayısı: ${fakeResponse.badges}\n`;
            output += `  Son Oyun: ${fakeResponse.lastGame}\n`;
            output += `  Profil: ${fakeResponse.profile}\n\n`;
          } else {
            output += `<span class="fail">[FAIL] ${trimmed} - Invalid / Private</span>\n\n`;
          }
        } catch (err) {
          output += `<span class="fail">[ERROR] ${trimmed} - ${err.message}</span>\n\n`;
        }
      }

      loader.style.display = 'none';
      btn.disabled = false;
      result.innerHTML = output || '<span class="fail">Hiçbir şey kontrol edilmedi.</span>';
    });
  </script>
</body>
</html>
