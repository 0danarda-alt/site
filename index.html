<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMSOnay Sorgu</title>
  <style>
    body { font-family: sans-serif; background: #f4f4f9; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .container { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; width: 100%; }
    h1 { text-align: center; color: #333; }
    label { display: block; margin: 10px 0 5px; font-weight: bold; }
    input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; }
    button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
    button:hover { background: #0056b3; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    #result { margin-top: 20px; padding: 15px; border-radius: 5px; text-align: center; font-weight: bold; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #007bff; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; display: none; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="container">
  <h1>SMSOnay Bakiye & Numara Sorgu</h1>
  
  <label for="email">E-posta</label>
  <input type="email" id="email" placeholder="ornek@email.com" required>
  
  <label for="password">Şifre</label>
  <input type="password" id="password" placeholder="Şifreniz" required>
  
  <button id="btnSorgula">Sorgula</button>
  
  <div class="loader" id="loader"></div>
  
  <div id="result"></div>
</div>

<script>
const API_URL = '/check';  // Aynı siteden POST atıyoruz

document.getElementById('btnSorgula').addEventListener('click', async () => {
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('password').value.trim();
  const resultDiv = document.getElementById('result');
  const loader = document.getElementById('loader');
  const btn = document.getElementById('btnSorgula');

  if (!email || !pass) {
    resultDiv.textContent = 'Lütfen tüm alanları doldurun';
    resultDiv.className = 'error';
    return;
  }

  resultDiv.textContent = '';
  resultDiv.className = '';
  loader.style.display = 'block';
  btn.disabled = true;

  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user: email, pass })
    });

    const data = await response.json();

    if (data.success) {
      resultDiv.textContent = data.fullDetail;
      resultDiv.className = 'success';
    } else {
      resultDiv.textContent = data.reason || 'Giriş başarısız';
      resultDiv.className = 'error';
    }
  } catch (err) {
    resultDiv.textContent = 'Hata: ' + err.message;
    resultDiv.className = 'error';
  } finally {
    loader.style.display = 'none';
    btn.disabled = false;
  }
});
</script>
</body>
</html>
