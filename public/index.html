<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Steam Hesap Kontrol</title>
  <style>
    textarea { width: 400px; height: 200px; }
    #result { margin-top: 20px; white-space: pre-line; }
  </style>
</head>
<body>
  <h3>Hesapları gir (isim:şifre formatında, her satır bir hesap):</h3>
  <textarea id="accounts"></textarea><br>
  <button id="startBtn">Başlat</button>

  <div id="result"></div>

  <script>
    document.getElementById("startBtn").addEventListener("click", async () => {
      const accountsText = document.getElementById("accounts").value.trim();
      const accounts = accountsText.split("\n"); // her satır ayrı hesap

      let output = "";

      for (const acc of accounts) {
        const [user, pass] = acc.split(":");

        try {
          // Backend'e isteği gönder
          const resp = await fetch("/checkAccount", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ user, pass })
          });
          const data = await resp.json();

          if (data.success && data.status === "hit") {
            output += `Hesap: ${user} | HIT ✅\nOyunlar: ${data.games.join(" | ")}\n\n`;
          } else {
            output += `Hesap: ${user} | FAIL ❌ (${data.reason || "Hatalı giriş"})\n\n`;
          }
        } catch (err) {
          output += `Hesap: ${user} | Hata: ${err.message}\n\n`;
        }
      }

      document.getElementById("result").textContent = output;
    });
  </script>
</body>
</html>
